<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟 · 专注计时器</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12,6 12,12 16,14"></polyline>
                </svg>
                <h1 class="app-title">FocusTimer</h1>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="soundToggle" title="音效开关">
                    <svg class="icon-sound-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="11,5 6,9 2,9 2,15 6,15 11,19 11,5"></polygon>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                    </svg>
                    <svg class="icon-sound-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="11,5 6,9 2,9 2,15 6,15 11,19 11,5"></polygon>
                        <line x1="23" y1="9" x2="17" y2="15"></line>
                        <line x1="17" y1="9" x2="23" y2="15"></line>
                    </svg>
                </button>
                <button class="icon-btn" id="fullscreenToggle" title="全屏模式">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                    </svg>
                </button>
            </div>
        </header>

        <main class="app-main">
            <section class="timer-section">
                <div class="mode-tabs">
                    <button class="tab-btn active" data-mode="pomodoro">番茄模式</button>
                    <button class="tab-btn" data-mode="countdown">倒计时</button>
                    <button class="tab-btn" data-mode="stopwatch">正计时</button>
                </div>

                <div class="timer-display">
                    <div class="progress-ring-wrapper">
                        <svg class="progress-ring" viewBox="0 0 280 280">
                            <circle class="ring-bg" cx="140" cy="140" r="120"></circle>
                            <circle class="ring-progress" cx="140" cy="140" r="120"></circle>
                        </svg>
                        <div class="timer-content">
                            <div class="pomodoro-status" id="pomodoroStatus">
                                <span class="status-indicator"></span>
                                <span class="status-text">准备专注</span>
                            </div>
                            <div class="time-display" id="timeDisplay">25:00</div>
                            <div class="pomodoro-counter" id="pomodoroCounter">
                                <span class="tomato">🍅</span>
                                <span id="completedPomodoros">0</span>
                                <span class="divider">/</span>
                                <span id="targetPomodoros">4</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="timer-controls">
                    <button class="control-btn btn-reset" id="resetBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                            <path d="M3 3v5h5"></path>
                        </svg>
                        <span>重置</span>
                    </button>
                    <button class="control-btn btn-primary" id="startBtn">
                        <svg class="icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="5,3 19,12 5,21 5,3"></polygon>
                        </svg>
                        <svg class="icon-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="6" y="4" width="4" height="16"></rect>
                            <rect x="14" y="4" width="4" height="16"></rect>
                        </svg>
                        <span id="startBtnText">开始</span>
                    </button>
                    <button class="control-btn btn-skip" id="skipBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="5,4 15,12 5,20 5,4"></polygon>
                            <line x1="19" y1="5" x2="19" y2="19"></line>
                        </svg>
                        <span>跳过</span>
                    </button>
                </div>

                <div class="settings-panel">
                    <div class="setting-group pomodoro-settings">
                        <h3 class="setting-title">番茄钟设置</h3>
                        <div class="setting-row">
                            <label>专注时长</label>
                            <div class="number-input">
                                <button class="num-btn minus" data-field="focusDuration">-</button>
                                <input type="number" id="focusDuration" value="25" min="1" max="120">
                                <span class="unit">分钟</span>
                                <button class="num-btn plus" data-field="focusDuration">+</button>
                            </div>
                        </div>
                        <div class="setting-row">
                            <label>短休息</label>
                            <div class="number-input">
                                <button class="num-btn minus" data-field="shortBreakDuration">-</button>
                                <input type="number" id="shortBreakDuration" value="5" min="1" max="30">
                                <span class="unit">分钟</span>
                                <button class="num-btn plus" data-field="shortBreakDuration">+</button>
                            </div>
                        </div>
                        <div class="setting-row">
                            <label>长休息</label>
                            <div class="number-input">
                                <button class="num-btn minus" data-field="longBreakDuration">-</button>
                                <input type="number" id="longBreakDuration" value="15" min="1" max="60">
                                <span class="unit">分钟</span>
                                <button class="num-btn plus" data-field="longBreakDuration">+</button>
                            </div>
                        </div>
                    </div>

                    <div class="setting-group countdown-settings hidden">
                        <h3 class="setting-title">倒计时设置</h3>
                        <div class="time-inputs">
                            <div class="time-input-group">
                                <input type="number" id="countdownHours" value="0" min="0" max="23">
                                <span class="time-label">时</span>
                            </div>
                            <span class="time-separator">:</span>
                            <div class="time-input-group">
                                <input type="number" id="countdownMinutes" value="10" min="0" max="59">
                                <span class="time-label">分</span>
                            </div>
                            <span class="time-separator">:</span>
                            <div class="time-input-group">
                                <input type="number" id="countdownSeconds" value="0" min="0" max="59">
                                <span class="time-label">秒</span>
                            </div>
                        </div>
                        <div class="preset-buttons">
                            <button class="preset-btn" data-seconds="300">5分钟</button>
                            <button class="preset-btn" data-seconds="600">10分钟</button>
                            <button class="preset-btn" data-seconds="1800">30分钟</button>
                            <button class="preset-btn" data-seconds="3600">1小时</button>
                        </div>
                    </div>

                    <div class="setting-group stopwatch-settings hidden">
                        <h3 class="setting-title">正计时</h3>
                        <p class="setting-desc">从0开始计时，精确到秒</p>
                    </div>
                </div>
            </section>

            <aside class="task-section">
                <div class="task-header">
                    <h2 class="task-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 11l3 3L22 4"></path>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                        </svg>
                        任务清单
                    </h2>
                    <span class="task-count" id="taskCount">0 项</span>
                </div>

                <div class="task-input-wrapper">
                    <input type="text" id="taskInput" class="task-input" placeholder="添加新任务..." maxlength="100">
                    <button class="add-task-btn" id="addTaskBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                </div>

                <div class="task-list" id="taskList">
                </div>

                <div class="task-stats">
                    <div class="stat-item">
                        <span class="stat-value" id="statPomodoros">0</span>
                        <span class="stat-label">已完成番茄</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="statFocusTime">0h</span>
                        <span class="stat-label">总专注时长</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="statTasks">0</span>
                        <span class="stat-label">已完成任务</span>
                    </div>
                </div>
            </aside>
        </main>

        <div class="task-template" id="taskTemplate" style="display: none;">
            <div class="task-item" data-id="">
                <label class="checkbox-wrapper">
                    <input type="checkbox" class="task-checkbox">
                    <span class="checkmark">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <polyline points="20,6 9,17 4,12"></polyline>
                        </svg>
                    </span>
                </label>
                <div class="task-content">
                    <span class="task-text"></span>
                    <span class="task-pomodoros">
                        <span class="mini-tomato">🍅</span>
                        <span class="pomo-count">0</span>
                    </span>
                </div>
                <button class="task-delete" title="删除任务">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3,6 5,6 21,6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="js/storageManager.js"></script>
    <script src="js/soundManager.js"></script>
    <script src="js/progressRing.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/pomodoro.js"></script>
    <script src="js/taskManager.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
